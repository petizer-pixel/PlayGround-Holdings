<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="logo.jpg">
<title>EZ7 — דשבורד פרויקטים</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F4F3F0; --surface: #FFFFFF; --border: #E4E2DC; --border-strong: #C8C5BC;
    --text-primary: #1A1916; --text-secondary: #6B6860; --text-muted: #A8A69F;
    --green: #2D6A4F; --green-bg: #D8F3DC; --amber: #92400E; --amber-bg: #FEF3C7;
    --red: #B91C1C; --red-bg: #FEE2E2;
    --accent: #1A1916; --radius: 14px; --radius-sm: 8px; --radius-xs: 6px;
  }
  body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }

  /* HEADER */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 17px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--text-muted); font-weight: 300; font-size: 13px; margin-right: 8px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .sync-status { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
  .live-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #22C55E; animation: pulse 2s infinite; }
  .live-dot.offline { background: #EF4444; animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .user-select { padding: 5px 8px; border: 1px solid var(--border); border-radius: var(--radius-xs); font-size: 12px; font-family: 'Heebo', sans-serif; color: var(--text-primary); background: var(--bg); direction: rtl; outline: none; cursor: pointer; }
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border-strong); background: var(--surface); color: var(--text-primary); font-family: 'Heebo', sans-serif; transition: background 0.15s; }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #333; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* LAYOUT */
  .container { max-width: 960px; margin: 0 auto; padding: 1.5rem; }

  /* STATS */
  .summary-bar { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.25rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.875rem 1rem; text-align: center; }
  .stat-val { font-size: 26px; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }

  /* TABS */
  .tabs-row { display: flex; gap: 4px; margin-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
  .tab-btn { padding: 8px 16px; font-size: 13px; font-weight: 500; color: var(--text-secondary); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-family: 'Heebo', sans-serif; transition: color 0.15s, border-color 0.15s; margin-bottom: -1px; }
  .tab-btn:hover { color: var(--text-primary); }
  .tab-btn.active { color: var(--text-primary); border-bottom-color: var(--accent); }

  /* PROJECT CARD */
  .project-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; }
  .project-header { padding: 1rem 1.25rem; display: flex; align-items: center; gap: 12px; }
  .project-header-main { flex: 1; }
  .project-name { font-size: 16px; font-weight: 700; color: var(--text-primary); }
  .project-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 2px 9px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
  .badge-type { background: #F0EFE8; color: var(--text-secondary); border: 1px solid var(--border); }
  .badge-active { background: var(--green-bg); color: var(--green); }
  .badge-slow { background: var(--amber-bg); color: var(--amber); }
  .badge-waiting { background: #FCE7F3; color: #9D174D; }
  .progress-mini { display: flex; align-items: center; gap: 6px; }
  .progress-track { width: 80px; height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; }
  .progress-pct { font-size: 12px; color: var(--text-muted); }
  .project-actions { display: flex; gap: 6px; flex-shrink: 0; }

  /* PROJECT INFO ROW */
  .project-info { padding: 0 1.25rem 0.75rem; display: flex; flex-direction: column; gap: 4px; }
  .info-row { font-size: 13px; color: var(--text-secondary); display: flex; gap: 6px; }
  .info-row strong { color: var(--text-primary); font-weight: 500; }

  /* CHECKPOINT */
  .checkpoint-section { margin: 0 1.25rem 0.75rem; background: #FFFDF0; border: 1px solid #F0E89A; border-radius: var(--radius-sm); padding: 10px 12px; }
  .checkpoint-label { font-size: 11px; font-weight: 600; color: #92660A; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
  .checkpoint-textarea { width: 100%; padding: 0; border: none; font-size: 13px; font-family: 'Heebo', sans-serif; color: var(--text-primary); background: transparent; direction: rtl; outline: none; resize: none; min-height: 50px; line-height: 1.6; }
  .checkpoint-textarea::placeholder { color: #C4A84A; font-style: italic; }
  .checkpoint-saved { font-size: 10px; color: #92660A; margin-top: 3px; height: 12px; }

  /* DOMAIN SECTIONS */
  .domains-container { border-top: 1px solid var(--border); }
  .domain-section { border-bottom: 1px solid var(--border); }
  .domain-section:last-child { border-bottom: none; }
  .domain-header { display: flex; align-items: center; gap: 10px; padding: 10px 1.25rem; cursor: pointer; user-select: none; transition: background 0.1s; }
  .domain-header:hover { background: #FAFAF8; }
  .domain-icon { font-size: 14px; width: 22px; text-align: center; flex-shrink: 0; }
  .domain-name { font-size: 13px; font-weight: 600; color: var(--text-primary); flex: 1; }
  .domain-count { font-size: 11px; color: var(--text-muted); background: var(--bg); padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border); }
  .domain-toggle { font-size: 11px; color: var(--text-muted); transition: transform 0.2s; }
  .domain-toggle.open { transform: rotate(180deg); }
  .domain-body { display: none; padding: 0 1.25rem 10px; }
  .domain-body.open { display: block; }

  /* TASK TABLE */
  .task-table { width: 100%; border-collapse: collapse; }
  .task-table th { font-size: 10px; font-weight: 600; color: var(--text-muted); text-align: right; padding: 5px 8px; border-bottom: 1px solid var(--border); background: #FAFAF8; text-transform: uppercase; letter-spacing: 0.04em; }
  .task-table td { padding: 8px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: 13px; color: var(--text-secondary); }
  .task-table tr:last-child td { border-bottom: none; }
  .task-table tr:hover td { background: #FAFAF8; }
  .task-cb { width: 16px; height: 16px; border: 1.5px solid var(--border-strong); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s, border-color 0.15s; flex-shrink: 0; margin: 0 auto; }
  .task-cb:hover { border-color: var(--green); }
  .task-cb.done { background: var(--green); border-color: var(--green); }
  .task-cb.done::after { content: '✓'; color: white; font-size: 10px; }
  .task-name-cell { font-weight: 500; color: var(--text-primary); }
  .task-desc-cell { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .task-due-badge { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
  .due-ok { background: var(--green-bg); color: var(--green); }
  .due-soon { background: var(--amber-bg); color: var(--amber); }
  .due-overdue { background: var(--red-bg); color: var(--red); }
  .owner-tag { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
  .task-actions-cell { display: flex; gap: 3px; opacity: 0; transition: opacity 0.15s; }
  tr:hover .task-actions-cell { opacity: 1; }
  .task-act-btn { padding: 3px 5px; border: none; background: none; cursor: pointer; border-radius: 4px; font-size: 12px; }
  .task-act-btn:hover { background: var(--border); }

  /* ADD TASK ROW */
  .add-task-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .add-input { padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-xs); font-size: 12px; font-family: 'Heebo', sans-serif; color: var(--text-primary); background: var(--bg); direction: rtl; outline: none; }
  .add-input:focus { border-color: var(--accent); }
  .add-input::placeholder { color: var(--text-muted); }
  .add-input.task-name-inp { flex: 1; min-width: 120px; }
  .add-input.owner-inp { width: 80px; }
  .add-input.due-inp { width: 120px; direction: ltr; }
  .add-input.type-sel { width: auto; cursor: pointer; }

  /* MY TASKS VIEW */
  .my-project-group { margin-bottom: 14px; }
  .my-project-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; padding: 0 2px; }
  .my-task-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 6px; }
  .my-task-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .my-task-meta { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .my-task-empty { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 13px; }

  /* DOMAIN TYPE BADGES */
  .type-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
  .type-לוגיסטיקה { background: #FEF3C7; color: #92400E; }
  .type-שיווק { background: #FCE7F3; color: #9D174D; }
  .type-הפקה { background: #D8F3DC; color: #2D6A4F; }
  .type-תוכן { background: #EEF2FF; color: #3730A3; }
  .type-תחרות { background: #FFF7ED; color: #C2410C; }

  /* AI PANEL */
  .ai-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-top: 1.5rem; }
  .ai-panel-header { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
  .ai-icon { width: 26px; height: 26px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .ai-title { font-size: 14px; font-weight: 600; }
  .ai-subtitle { font-size: 12px; color: var(--text-secondary); }
  .ai-input-row { display: flex; gap: 8px; }
  .ai-input { flex: 1; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: 'Heebo', sans-serif; color: var(--text-primary); background: var(--bg); direction: rtl; outline: none; }
  .ai-input:focus { border-color: var(--accent); }
  .ai-response { margin-top: 12px; padding: 12px; background: var(--bg); border-radius: var(--radius-sm); font-size: 13px; line-height: 1.6; display: none; white-space: pre-wrap; direction: rtl; }
  .ai-response.visible { display: block; }
  .loading-dots span { animation: blink 1.2s infinite; font-size: 18px; color: var(--text-muted); }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  /* MODALS */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; direction: rtl; }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
  .field-group { margin-bottom: 1rem; }
  .field-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; display: block; }
  .field-input, .field-select, .field-textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: 'Heebo', sans-serif; color: var(--text-primary); background: var(--bg); direction: rtl; outline: none; }
  .field-input:focus, .field-select:focus, .field-textarea:focus { border-color: var(--accent); }
  .field-textarea { resize: vertical; min-height: 60px; }
  .progress-input { width: 100%; accent-color: var(--accent); }
  .modal-footer { display: flex; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; }

  /* ARCHIVE */
  .archive-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); direction: rtl; }
  .archive-item:last-child { border-bottom: none; }
  .archive-item-name { font-size: 13px; color: var(--text-secondary); text-decoration: line-through; }
  .archive-item-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; display: flex; gap: 8px; }
  .archive-empty { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 13px; }

  /* MISC */
  .filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-pill { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary); cursor: pointer; font-family: 'Heebo', sans-serif; transition: background 0.15s, color 0.15s, border-color 0.15s; }
  .filter-pill:hover { border-color: var(--border-strong); color: var(--text-primary); }
  .filter-pill.active { background: var(--accent); color: white; border-color: var(--accent); }
  .last-updated { font-size: 11px; color: var(--text-muted); text-align: left; margin-top: 1rem; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 10px 20px; border-radius: var(--radius-sm); font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 300; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .section-title { font-size: 13px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; }

  @media (max-width: 600px) {
    header { padding: 0.75rem 1rem; }
    .container { padding: 1rem; }
    .stat-val { font-size: 22px; }
    .task-table th.hide-m, .task-table td.hide-m { display: none; }
    .task-actions-cell { opacity: 1; }
    .add-input.owner-inp, .add-input.due-inp { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">EZ7 <span>דשבורד</span></div>
  <div class="header-right">
    <select class="user-select" id="user-select" onchange="onUserChange()">
      <option value="">מי אתה?</option>
    </select>
    <div class="sync-status">
      <span class="live-dot" id="sync-dot"></span>
      <span id="sync-label">מתחבר...</span>
    </div>
    <button class="btn btn-sm" onclick="openArchive()">📦</button>
    <button class="btn btn-primary btn-sm" onclick="openAddProject()">+ פרויקט</button>
  </div>
</header>

<div class="container">
  <div class="summary-bar">
    <div class="stat"><div class="stat-val" id="stat-projects">—</div><div class="stat-label">פרויקטים</div></div>
    <div class="stat"><div class="stat-val" id="stat-avg">—</div><div class="stat-label">התקדמות ממוצעת</div></div>
    <div class="stat"><div class="stat-val" id="stat-tasks">—</div><div class="stat-label">משימות פתוחות</div></div>
  </div>

  <div class="tabs-row">
    <button class="tab-btn active" id="tab-all" onclick="switchTab('all')">כל הפרויקטים</button>
    <button class="tab-btn" id="tab-mine" onclick="switchTab('mine')">המשימות שלי</button>
  </div>

  <div id="all-view">
    <div class="filter-bar">
      <span class="filter-label">סנן לפי תחום:</span>
      <div class="filter-pills" id="filter-pills">
        <button class="filter-pill active" onclick="setFilter('')">הכל</button>
        <button class="filter-pill" onclick="setFilter('לוגיסטיקה')">📦 לוגיסטיקה</button>
        <button class="filter-pill" onclick="setFilter('שיווק')">📣 שיווק</button>
        <button class="filter-pill" onclick="setFilter('הפקה')">🔧 הפקה</button>
        <button class="filter-pill" onclick="setFilter('תוכן')">🎬 תוכן</button>
        <button class="filter-pill" onclick="setFilter('תחרות')">🏆 תחרות</button>
        <button class="filter-pill" onclick="setFilter('כללי')">📋 כללי</button>
      </div>
    </div>
    <div id="projects-container"><div style="text-align:center;padding:2rem;color:var(--text-muted)">טוען...</div></div>
  </div>

  <div id="mine-view" style="display:none">
    <div id="my-tasks-container"></div>
  </div>

  <div class="ai-panel">
    <div class="ai-panel-header">
      <div class="ai-icon">AI</div>
      <div><div class="ai-title">עוזר AI</div><div class="ai-subtitle">שאל שאלה על הפרויקטים</div></div>
    </div>
    <div class="ai-input-row">
      <input class="ai-input" id="ai-input" placeholder="למשל: מה המשימות הדחופות ביותר?" onkeydown="if(event.key==='Enter') askAI()" />
      <button class="btn btn-primary" onclick="askAI()">שאל</button>
    </div>
    <div class="ai-response" id="ai-response"></div>
  </div>
  <div class="last-updated" id="last-updated"></div>
</div>

<!-- Project Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modal-title">עריכת פרויקט</h3>
    <div class="field-group"><label class="field-label">שם פרויקט</label><input class="field-input" id="edit-name" /></div>
    <div class="field-group"><label class="field-label">סוג</label>
      <select class="field-select" id="edit-type"><option>עסקי</option><option>נדל"ן</option><option>אישי</option><option>טכנולוגי</option></select>
    </div>
    <div class="field-group"><label class="field-label">סטטוס</label>
      <select class="field-select" id="edit-status"><option value="active">פעיל</option><option value="slow">מתקדם לאט</option><option value="waiting">ממתין</option></select>
    </div>
    <div class="field-group"><label class="field-label">סטטוס נוכחי</label><textarea class="field-textarea" id="edit-current-status"></textarea></div>
    <div class="field-group"><label class="field-label">הצעד הבא</label><input class="field-input" id="edit-next-step" /></div>
    <div class="field-group">
      <label class="field-label">התקדמות: <span id="edit-pct-label">0%</span></label>
      <input type="range" class="progress-input" id="edit-pct" min="0" max="100" step="5" oninput="document.getElementById('edit-pct-label').textContent=this.value+'%'" />
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveEdit()">שמור</button>
      <button class="btn" onclick="closeModal()">ביטול</button>
      <button class="btn" style="margin-right:auto;color:#B91C1C;border-color:#FECACA" onclick="deleteProject()">מחק</button>
    </div>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-overlay" id="task-modal" onclick="closeTaskModal(event)">
  <div class="modal">
    <h3 id="task-modal-title">עריכת משימה</h3>
    <div class="field-group"><label class="field-label">שם משימה</label><input class="field-input" id="task-edit-text" /></div>
    <div class="field-group"><label class="field-label">תיאור</label><textarea class="field-textarea" id="task-edit-desc" placeholder="פרטים נוספים..."></textarea></div>
    <div class="field-group"><label class="field-label">אחראי</label><input class="field-input" id="task-edit-owner" placeholder="שם האחראי..." /></div>
    <div class="field-group"><label class="field-label">תחום</label>
      <select class="field-select" id="task-edit-type">
        <option value="">— ללא תחום —</option>
        <option value="לוגיסטיקה">לוגיסטיקה</option>
        <option value="שיווק">שיווק</option>
        <option value="הפקה">הפקה</option>
        <option value="תוכן">תוכן</option>
        <option value="תחרות">תחרות</option>
        <option value="כללי">כללי</option>
      </select>
    </div>
    <div class="field-group"><label class="field-label">תאריך הוספה</label><input class="field-input" id="task-edit-date" type="date" /></div>
    <div class="field-group"><label class="field-label">תאריך יעד</label><input class="field-input" id="task-edit-due" type="date" /></div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveTaskEdit()">שמור</button>
      <button class="btn" onclick="closeTaskModal()">ביטול</button>

let projects = [];

// Track which domains are open per project: domainOpen[pid][domain] = bool
let domainOpen = JSON.parse(localStorage.getItem('ez7_domain_open') || '{}');
let activeFilter = '';

function saveDomainState() { localStorage.setItem('ez7_domain_open', JSON.stringify(domainOpen)); }

function setFilter(domain) {
  activeFilter = domain;
  document.querySelectorAll('.filter-pill').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.includes(domain) || (domain === '' && btn.textContent === 'הכל'));
  });
  // Show/hide domain sections
  DOMAINS.forEach(d => {
    const sections = document.querySelectorAll(`[id^="db-"]`);
    sections.forEach(el => {
      const domainKey = el.id.split('-').slice(2).join('-');
      const header = document.getElementById(el.id.replace('db-', 'dh-'));
      const sectionEl = el.closest('.domain-section');
      if (!sectionEl) return;
      if (domain === '') {
        sectionEl.style.display = '';
      } else {
        sectionEl.style.display = domainKey === domain ? '' : 'none';
        if (domainKey === domain) {
          // Auto-open filtered domain
          el.classList.add('open');
          const toggle = document.getElementById(el.id.replace('db-', 'dt-'));
          if (toggle) toggle.classList.add('open');
        }
      }
    });
  });
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function setSyncStatus(online, label) {
  document.getElementById('sync-dot').className = 'live-dot' + (online ? '' : ' offline');
  document.getElementById('sync-label').textContent = label;
}

async function loadFromSupabase() {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/projects?select=*&order=id.asc&limit=1', { headers: HEADERS });
    if (!res.ok) throw new Error();
    const rows = await res.json();
    if (rows.length === 0) { await initSupabase(); return; }
    rowId = rows[0].id;
    const incoming = rows[0].data;
    incoming.forEach(p => {
      p.tasks.forEach(t => {
        if (!t.date) t.date = today;
        if (t.owner === undefined) t.owner = '';
        if (t.desc === undefined) t.desc = '';
        if (t.type === undefined) t.type = '';
        if (t.due === undefined) t.due = '';
      });
      if (p.checkpoint === undefined) p.checkpoint = '';
    });
    if (JSON.stringify(incoming) !== JSON.stringify(projects)) { projects = incoming; render(); }
    setSyncStatus(true, 'מסונכרן');
  } catch(e) { setSyncStatus(false, 'לא מחובר'); }
}

async function initSupabase() {
  const res = await fetch(SUPABASE_URL + '/rest/v1/projects', {
    method: 'POST', headers: { ...HEADERS, 'Prefer': 'return=representation' },
    body: JSON.stringify({ data: DEFAULT_PROJECTS })
  });
  const rows = await res.json();
  rowId = rows[0].id; projects = DEFAULT_PROJECTS; render();
}

async function saveToSupabase() {
  if (!rowId) return;
  try {
    await fetch(SUPABASE_URL + '/rest/v1/projects?id=eq.' + rowId, {
      method: 'PATCH', headers: { ...HEADERS, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ data: projects, updated_at: new Date().toISOString() })
    });
    setSyncStatus(true, 'מסונכרן');
    document.getElementById('last-updated').textContent = 'עודכן: ' + new Date().toLocaleString('he-IL');
  } catch(e) { setSyncStatus(false, 'שגיאה בשמירה'); }
}

function statusLabel(s) {
  if (s === 'active') return { text: 'פעיל', cls: 'badge-active' };
  if (s === 'slow') return { text: 'מתקדם לאט', cls: 'badge-slow' };
  return { text: 'ממתין', cls: 'badge-waiting' };
}
function progressColor(pct) {
  if (pct >= 60) return '#2D6A4F';
  if (pct >= 35) return '#92400E';
  return '#9D174D';
}
function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d + 'T00:00:00').toLocaleDateString('he-IL', {day:'numeric',month:'numeric'}); } catch(e) { return d; }
}
function getDueClass(due) {
  if (!due) return '';
  const now = new Date(); now.setHours(0,0,0,0);
  const d = new Date(due + 'T00:00:00');
  const diff = Math.round((d - now) / 86400000);
  if (diff < 0) return 'due-overdue';
  if (diff <= 2) return 'due-soon';
  return 'due-ok';
}

function getAllOwners() {
  const owners = new Set();
  projects.forEach(p => p.tasks.forEach(t => { if (t.owner && t.owner.trim()) owners.add(t.owner.trim()); }));
  return Array.from(owners).sort();
}

function populateUserSelect() {
  const sel = document.getElementById('user-select');
  if (!sel) return;
  const owners = getAllOwners();
  const newHtml = '<option value="">מי אתה?</option>' + owners.map(o => `<option value="${o}">${o}</option>`).join('');
  if (sel.getAttribute('data-opts') !== newHtml) {
    sel.innerHTML = newHtml;
    sel.setAttribute('data-opts', newHtml);
  }
  sel.value = owners.includes(currentUser) ? currentUser : '';
}

function onUserChange() {
  currentUser = document.getElementById('user-select').value;
  localStorage.setItem(CURRENT_USER_KEY, currentUser);
  if (activeTab === 'mine') renderMyTasks();
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-all').classList.toggle('active', tab === 'all');
  document.getElementById('tab-mine').classList.toggle('active', tab === 'mine');
  document.getElementById('all-view').style.display = tab === 'all' ? '' : 'none';
  document.getElementById('mine-view').style.display = tab === 'mine' ? '' : 'none';
  if (tab === 'mine') renderMyTasks();
}

function toggleDomain(pid, domain) {
  if (!domainOpen[pid]) domainOpen[pid] = {};
  domainOpen[pid][domain] = !domainOpen[pid][domain];
  saveDomainState();
  const body = document.getElementById(`db-${pid}-${domain}`);
  const toggle = document.getElementById(`dt-${pid}-${domain}`);
  if (body) body.classList.toggle('open', domainOpen[pid][domain]);
  if (toggle) toggle.classList.toggle('open', domainOpen[pid][domain]);
}

function render() {
  populateUserSelect();
  if (activeTab === 'mine') renderMyTasks();

  const container = document.getElementById('projects-container');
  const openTasks = projects.reduce((a, p) => a + p.tasks.filter(t => !t.done).length, 0);
  const avgPct = projects.length ? Math.round(projects.reduce((a, p) => a + p.pct, 0) / projects.length) : 0;
  document.getElementById('stat-projects').textContent = projects.length;
  document.getElementById('stat-avg').textContent = avgPct + '%';
  document.getElementById('stat-tasks').textContent = openTasks;

  container.innerHTML = projects.map(p => {
    const sl = statusLabel(p.status);
    const color = progressColor(p.pct);

    const domainsHtml = DOMAINS.map(d => {
      const tasks = p.tasks.filter(t => d.key === 'כללי' ? (!t.type || t.type === '' || t.type === 'כללי') : t.type === d.key);
      const isOpen = domainOpen[p.id] && domainOpen[p.id][d.key];
      const taskRows = tasks.map((t, _) => {
        const idx = p.tasks.indexOf(t);
        const dueClass = t.due ? getDueClass(t.due) : '';
        return `<tr>
          <td style="width:24px"><div class="task-cb" onclick="toggleTask(${p.id},${idx})"></div></td>
          <td>
            <div class="task-name-cell">${t.text}</div>
            ${t.desc ? `<div class="task-desc-cell">${t.desc}</div>` : ''}
          </td>
          <td class="hide-m">${t.owner ? `<span class="owner-tag">👤 ${t.owner}</span>` : ''}</td>
          <td class="hide-m">${t.due ? `<span class="task-due-badge ${dueClass}">${fmtDate(t.due)}</span>` : ''}</td>
          <td style="width:60px"><div class="task-actions-cell">
            <button class="task-act-btn" onclick="openTaskEdit(${p.id},${idx})">✏️</button>
            <button class="task-act-btn" onclick="deleteTask(${p.id},${idx})">🗑️</button>
          </div></td>
        </tr>`;
      }).join('');

      const addRow = `<div class="add-task-row">
        <input class="add-input task-name-inp" id="ti-${p.id}-${d.key}" placeholder="הוסף משימה ל${d.key}..." onkeydown="if(event.key==='Enter') addTask(${p.id},'${d.key}')" />
        <input class="add-input owner-inp" id="to-${p.id}-${d.key}" placeholder="אחראי" />
        <input type="date" class="add-input due-inp" id="td-${p.id}-${d.key}" title="תאריך יעד" />
        <button class="btn btn-sm" onclick="addTask(${p.id},'${d.key}')">+</button>
      </div>`;

      return `<div class="domain-section">
        <div class="domain-header" id="dh-${p.id}-${d.key}" onclick="toggleDomain(${p.id},'${d.key}')">
          <span class="domain-icon">${d.icon}</span>
          <span class="domain-name">${d.key}</span>
          <span class="domain-count">${tasks.length}</span>
          <span class="domain-toggle ${isOpen ? 'open' : ''}" id="dt-${p.id}-${d.key}">▾</span>
        </div>
        <div class="domain-body ${isOpen ? 'open' : ''}" id="db-${p.id}-${d.key}">
          ${tasks.length ? `<table class="task-table">
            <thead><tr>
              <th></th><th>משימה</th>
              <th class="hide-m">אחראי</th>
              <th class="hide-m">יעד</th>
              <th></th>
            </tr></thead>
            <tbody>${taskRows}</tbody>
          </table>` : ''}
          ${addRow}
        </div>
      </div>`;
    }).join('');

    return `<div class="project-card">
      <div class="project-header">
        <div class="project-header-main">
          <div class="project-name">${p.name}</div>
          <div class="project-meta">
            <span class="badge badge-type">${p.type}</span>
            <span class="badge ${sl.cls}">${sl.text}</span>
            <div class="progress-mini">
              <div class="progress-track"><div class="progress-fill" style="width:${p.pct}%;background:${color}"></div></div>
              <span class="progress-pct">${p.pct}%</span>
            </div>
          </div>
        </div>
        <div class="project-actions">
          <button class="btn btn-sm" onclick="openEdit(${p.id})">✏️</button>
        </div>
      </div>
      ${p.currentStatus || p.nextStep ? `<div class="project-info">
        ${p.currentStatus ? `<div class="info-row">סטטוס: <strong>${p.currentStatus}</strong></div>` : ''}
        ${p.nextStep ? `<div class="info-row">הצעד הבא: <strong>${p.nextStep}</strong></div>` : ''}
      </div>` : ''}
      <div class="checkpoint-section">
        <div class="checkpoint-label">📍 נקודת התחלה</div>
        <textarea class="checkpoint-textarea" id="cp-${p.id}" placeholder="כתוב את המחשבה האחרונה לפני סגירת היום..." onblur="saveCheckpoint(${p.id})">${p.checkpoint || ''}</textarea>
        <div class="checkpoint-saved" id="cp-status-${p.id}"></div>
      </div>
      <div class="domains-container">${domainsHtml}</div>
    </div>`;
  }).join('');
}

function renderMyTasks() {
  const container = document.getElementById('my-tasks-container');
  if (!currentUser) {
    container.innerHTML = '<div class="my-task-empty">בחר את השם שלך בראש הדף</div>'; return;
  }
  let html = ''; let total = 0;
  projects.forEach(p => {
    const mine = p.tasks.filter(t => t.owner && t.owner.trim() === currentUser);
    if (!mine.length) return;
    total += mine.length;
    html += `<div class="my-project-group">
      <div class="my-project-label">${p.name}</div>
      ${mine.map(t => {
        const idx = p.tasks.indexOf(t);
        const dueClass = t.due ? getDueClass(t.due) : '';
        return `<div class="my-task-row">
          <div class="task-cb" onclick="toggleTask(${p.id},${idx})"></div>
          <div class="my-task-name">${t.text}</div>
          <div class="my-task-meta">
            ${t.type ? `<span class="type-badge type-${t.type}">${t.type}</span>` : ''}
            ${t.due ? `<span class="task-due-badge ${dueClass}">${fmtDate(t.due)}</span>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  });
  container.innerHTML = total ? html : '<div class="my-task-empty">אין משימות פתוחות עבורך כרגע 🎉</div>';
}

function addTask(pid, domain) {
  const text = document.getElementById(`ti-${pid}-${domain}`)?.value.trim();
  if (!text) return;
  const owner = document.getElementById(`to-${pid}-${domain}`)?.value.trim() || '';
  const due = document.getElementById(`td-${pid}-${domain}`)?.value || '';
  const p = projects.find(x => x.id === pid);
  if (p) {
    p.tasks.push({ text, done: false, owner, desc: '', type: domain, date: today, due });
    // Keep domain open
    if (!domainOpen[pid]) domainOpen[pid] = {};
    domainOpen[pid][domain] = true;
    saveDomainState();
    render(); saveToSupabase(); toast('משימה נוספה ✓');
  }
}

function toggleTask(pid, idx) {
  const p = projects.find(x => x.id === pid);
  if (!p) return;
  const task = p.tasks[idx];
  const archivedTask = { ...task, projectName: p.name, completedAt: new Date().toISOString() };
  archive.push(archivedTask);
  p.tasks.splice(idx, 1);
  render(); saveToSupabase(); saveArchive(); toast('משימה הועברה לארכיון 📦');
}

function deleteTask(pid, idx) {
  const p = projects.find(x => x.id === pid);
  if (p) { p.tasks.splice(idx, 1); render(); saveToSupabase(); toast('משימה נמחקה'); }
}

function openTaskEdit(pid, idx) {
  editingTaskPid = pid; editingTaskIdx = idx;
  const t = projects.find(x => x.id === pid).tasks[idx];
  document.getElementById('task-modal-title').textContent = 'עריכת משימה';
  document.getElementById('task-edit-text').value = t.text;
  document.getElementById('task-edit-desc').value = t.desc || '';
  document.getElementById('task-edit-owner').value = t.owner || '';
  document.getElementById('task-edit-type').value = t.type || '';
  document.getElementById('task-edit-date').value = t.date || today;
  document.getElementById('task-edit-due').value = t.due || '';
  document.getElementById('task-modal').classList.add('open');
}

function saveTaskEdit() {
  const text = document.getElementById('task-edit-text').value.trim();
  if (!text) return;
  const p = projects.find(x => x.id === editingTaskPid);
  if (p && editingTaskIdx !== null) {
    const t = p.tasks[editingTaskIdx];
    t.text = text;
    t.desc = document.getElementById('task-edit-desc').value.trim();
    t.owner = document.getElementById('task-edit-owner').value.trim();
    t.type = document.getElementById('task-edit-type').value;
    t.date = document.getElementById('task-edit-date').value;
    t.due = document.getElementById('task-edit-due').value;
    render(); saveToSupabase(); closeTaskModal(); toast('משימה עודכנה ✓');
  }
}

function deleteTaskFromModal() {
  const p = projects.find(x => x.id === editingTaskPid);
  if (p && editingTaskIdx !== null) {
    p.tasks.splice(editingTaskIdx, 1);
    render(); saveToSupabase(); closeTaskModal(); toast('משימה נמחקה');
  }
}

function closeTaskModal(e) {
  if (e && e.target !== document.getElementById('task-modal')) return;
  document.getElementById('task-modal').classList.remove('open');
  editingTaskPid = null; editingTaskIdx = null;
}

function saveCheckpoint(pid) {
  const ta = document.getElementById('cp-' + pid);
  const p = projects.find(x => x.id === pid);
  if (p && ta) {
    p.checkpoint = ta.value;
    saveToSupabase();
    const el = document.getElementById('cp-status-' + pid);
    if (el) { el.textContent = 'נשמר ✓'; setTimeout(() => { if(el) el.textContent=''; }, 2000); }
  }
}

function openEdit(pid) {
  editingId = pid;
  const p = projects.find(x => x.id === pid);
  document.getElementById('modal-title').textContent = 'עריכת פרויקט';
  document.getElementById('edit-name').value = p.name;
  document.getElementById('edit-type').value = p.type;
  document.getElementById('edit-status').value = p.status;
  document.getElementById('edit-current-status').value = p.currentStatus || '';
  document.getElementById('edit-next-step').value = p.nextStep || '';
  document.getElementById('edit-pct').value = p.pct;
  document.getElementById('edit-pct-label').textContent = p.pct + '%';
  document.getElementById('modal').classList.add('open');
}

function openAddProject() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'פרויקט חדש';
  ['edit-name','edit-current-status','edit-next-step'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('edit-type').value = 'עסקי';
  document.getElementById('edit-status').value = 'active';
  document.getElementById('edit-pct').value = 0;
  document.getElementById('edit-pct-label').textContent = '0%';
  document.getElementById('modal').classList.add('open');
}

function saveEdit() {
  const name = document.getElementById('edit-name').value.trim();
  if (!name) return;
  if (editingId) {
    const p = projects.find(x => x.id === editingId);
    if (p) { p.name = name; p.type = document.getElementById('edit-type').value; p.status = document.getElementById('edit-status').value; p.currentStatus = document.getElementById('edit-current-status').value; p.nextStep = document.getElementById('edit-next-step').value; p.pct = parseInt(document.getElementById('edit-pct').value); }
  } else {
    const newId = Math.max(0, ...projects.map(p => p.id)) + 1;
    projects.push({ id: newId, name, type: document.getElementById('edit-type').value, status: document.getElementById('edit-status').value, currentStatus: document.getElementById('edit-current-status').value, nextStep: document.getElementById('edit-next-step').value, pct: parseInt(document.getElementById('edit-pct').value), checkpoint: '', tasks: [] });
  }
  render(); saveToSupabase(); closeModal(); toast('נשמר ✓');
}

function deleteProject() {
  if (!editingId || !confirm('למחוק את הפרויקט?')) return;
  projects = projects.filter(p => p.id !== editingId);
  render(); saveToSupabase(); closeModal(); toast('פרויקט נמחק');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
}

function loadArchive() {
  try { archive = JSON.parse(localStorage.getItem('ez7_archive') || '[]'); } catch(e) { archive = []; }
}
function saveArchive() { localStorage.setItem('ez7_archive', JSON.stringify(archive)); }

function openArchive() {
  const list = document.getElementById('archive-list');
  if (!archive.length) { list.innerHTML = '<div class="archive-empty">אין משימות בארכיון עדיין</div>'; }
  else {
    const grouped = {};
    archive.forEach(t => { if (!grouped[t.projectName]) grouped[t.projectName] = []; grouped[t.projectName].push(t); });
    list.innerHTML = Object.entries(grouped).map(([proj, tasks]) => `
      <div style="margin-bottom:12px">
        <div style="font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:6px">${proj}</div>
        ${tasks.map(t => `<div class="archive-item">
          <div style="flex:1">
            <div class="archive-item-name">${t.text}</div>
            <div class="archive-item-meta">
              ${t.owner ? '<span>👤 '+t.owner+'</span>' : ''}
              ${t.type ? '<span>🏷️ '+t.type+'</span>' : ''}
              ${t.completedAt ? '<span>✓ '+new Date(t.completedAt).toLocaleDateString("he-IL")+'</span>' : ''}
            </div>
          </div>
          <button class="btn btn-sm" onclick="restoreTask('${proj}',${archive.indexOf(t)})">↩️</button>
        </div>`).join('')}
      </div>`).join('');
  }
  document.getElementById('archive-modal').classList.add('open');
}

function restoreTask(projectName, archiveIdx) {
  const task = archive[archiveIdx];
  if (!task) return;
  const p = projects.find(x => x.name === projectName);
  if (p) {
    const { completedAt, projectName: pn, ...restored } = task;
    restored.done = false;
    p.tasks.push(restored);
    archive.splice(archiveIdx, 1);
    render(); saveToSupabase(); saveArchive(); closeArchiveModal(); toast('משימה שוחזרה ✓');
  }
}

function clearArchive() {
  if (!confirm('למחוק את כל הארכיון?')) return;
  archive = []; saveArchive(); openArchive(); toast('ארכיון נוקה');
}

function closeArchiveModal(e) {
  if (e && e.target !== document.getElementById('archive-modal')) return;
  document.getElementById('archive-modal').classList.remove('open');
}

async function askAI() {
  const input = document.getElementById('ai-input');
  const responseEl = document.getElementById('ai-response');
  const question = input.value.trim();
  if (!question) return;
  responseEl.className = 'ai-response visible';
  responseEl.innerHTML = '<div class="loading-dots"><span>•</span><span>•</span><span>•</span></div>';
  input.value = '';
  const summary = projects.map(p => `פרויקט: ${p.name}\nסטטוס: ${p.currentStatus||'—'}\nהתקדמות: ${p.pct}%\nהצעד הבא: ${p.nextStep||'—'}\nמשימות פתוחות: ${p.tasks.map(t=>`${t.text}${t.owner?' ('+t.owner+')':''}${t.type?' ['+t.type+']':''}`).join(', ')||'אין'}`).join('\n---\n');
  try {
    const res = await fetch('https://ez7-ai-proxy.petizer.workers.dev', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000,
        system: 'אתה עוזר עסקי של גיא פטיזר. ענה בעברית, קצר וממוקד.\n\nנתוני פרויקטים:\n' + summary,
        messages: [{ role: 'user', content: question }] })
    });
    if (!res.ok) { responseEl.textContent = 'שגיאת שרת: ' + res.status; return; }
    const data = await res.json();
    if (data.error) { responseEl.textContent = 'שגיאה: ' + data.error.message; return; }
    responseEl.textContent = data.content?.find(b => b.type === 'text')?.text || 'לא התקבלה תשובה.';
  } catch(e) { responseEl.textContent = 'שגיאה בחיבור ל-AI.'; }
}

if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }

loadArchive();
loadFromSupabase();
setInterval(loadFromSupabase, 10000);
</script>
