<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EZ7 - מחשבון שעות ומגרשים לליגה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B1D3A;
    --navy-light:#16315E;
    --gold:#C9A227;
    --gold-light:#E9D690;
    --bg:#F5F4F0;
    --white:#FFFFFF;
    --text:#13203A;
    --text-muted:#6B7280;
    --border:#E2E0D8;
    --success:#1E7A4C;
    --warning:#B4790E;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family:'Heebo', sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.6;
  }
  header{
    background:var(--navy);
    padding:28px 24px;
    display:flex;
    align-items:center;
    gap:16px;
  }
  header .logo{
    font-family:'Barlow Condensed', sans-serif;
    font-weight:700;
    font-size:28px;
    letter-spacing:1px;
    color:var(--gold);
    border:2px solid var(--gold);
    padding:2px 10px;
    border-radius:4px;
  }
  header h1{
    font-family:'Barlow Condensed', sans-serif;
    font-weight:600;
    font-size:20px;
    color:var(--white);
    margin:0;
  }
  header p{
    margin:2px 0 0;
    font-size:13px;
    color:#AEB9CC;
  }
  main{
    max-width:980px;
    margin:0 auto;
    padding:28px 20px 60px;
  }
  .card{
    background:var(--white);
    border:1px solid var(--border);
    border-radius:12px;
    padding:24px;
    margin-bottom:20px;
  }
  .controls{
    display:flex;
    gap:24px;
    flex-wrap:wrap;
    margin-bottom:24px;
  }
  .control{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .control label{
    font-size:13px;
    color:var(--text-muted);
    font-weight:500;
  }
  input[type=number], input[type=text]{
    font-family:'Heebo', sans-serif;
    border:1px solid var(--border);
    border-radius:6px;
    padding:8px 10px;
    font-size:14px;
    color:var(--text);
    background:var(--white);
  }
  input[type=number]:focus, input[type=text]:focus{
    outline:none;
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(201,162,39,0.18);
  }
  .control input{ width:90px; }
  .table-wrap{ overflow-x:auto; }
  table{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
    min-width:720px;
  }
  thead th{
    text-align:center;
    padding:10px 8px;
    font-weight:500;
    color:var(--text-muted);
    border-bottom:2px solid var(--navy);
    white-space:nowrap;
  }
  thead th:first-child{ text-align:right; }
  tbody input[type=text]{ width:100%; min-width:140px; }
  tbody input[type=number]{ width:56px; text-align:center; }
  td{ padding:8px; text-align:center; }
  td:first-child{ text-align:right; }
  tr.region-row{
    background:#F0EEE6;
    border-top:2px solid var(--navy);
  }
  tr.region-row input{ font-weight:700; background:transparent; border:none; font-size:15px; }
  tr.region-row input:focus{ background:var(--white); border:1px solid var(--gold); }
  tr.club-row{ border-bottom:1px solid var(--border); }
  tr.club-row td:first-child{ padding-right:28px; }
  tr.subtotal-row{
    font-style:italic;
    color:var(--text-muted);
    border-bottom:2px solid var(--border);
    background:#FAFAF7;
  }
  .icon-btn{
    border:none;
    background:transparent;
    cursor:pointer;
    color:var(--text-muted);
    font-size:16px;
    padding:2px 6px;
    border-radius:4px;
  }
  .icon-btn:hover{ background:#E9E7DD; color:var(--navy); }
  .add-region-btn{
    border:1px solid var(--navy);
    color:var(--navy);
    background:var(--white);
    border-radius:6px;
    padding:9px 16px;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
    font-family:'Heebo', sans-serif;
  }
  .add-region-btn:hover{ background:var(--navy); color:var(--white); }
  .summary{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(180px,1fr));
    gap:14px;
    margin-top:24px;
  }
  .metric{
    background:var(--navy);
    border-radius:10px;
    padding:16px 18px;
  }
  .metric p.label{
    margin:0 0 6px;
    font-size:12px;
    color:#AEB9CC;
    font-weight:500;
  }
  .metric p.value{
    margin:0;
    font-size:26px;
    font-weight:700;
    color:var(--gold-light);
    font-family:'Barlow Condensed', sans-serif;
  }
  .metric p.value.ok{ color:#7FE0AD; }
  .metric p.value.warn{ color:#F0C46A; }
  footer{
    text-align:center;
    font-size:12px;
    color:var(--text-muted);
    padding:20px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">EZ7</div>
  <div>
    <h1>מחשבון שעות ומגרשים לליגה</h1>
    <p>תכנון מחזורים שבועיים לפי אזורים ומועדונים</p>
  </div>
</header>

<main>
  <div class="card">
    <div class="controls">
      <div class="control">
        <label>אורך סלוט (דקות)</label>
        <input type="number" id="slotLen" value="60" min="30" max="180" step="5">
      </div>
      <div class="control">
        <label>ימי משחקים בשבוע</label>
        <input type="number" id="days" value="3" min="1" max="7" step="1">
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>אזור / מועדון</th>
            <th>מגרשים</th>
            <th>משחקים / שבוע</th>
            <th>משחקים / יום</th>
            <th>שעות / יום</th>
            <th>שעות-מגרש / שבוע</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div style="margin-top:16px;">
      <button class="add-region-btn" id="addRegion">+ הוספת אזור</button>
    </div>

    <div class="summary">
      <div class="metric">
        <p class="label">סה״כ משחקים בשבוע</p>
        <p class="value" id="sumGamesCard">-</p>
      </div>
      <div class="metric">
        <p class="label">אזורים / מועדונים</p>
        <p class="value" id="sumVenuesCard">-</p>
      </div>
      <div class="metric">
        <p class="label">שעות-מגרש לשבוע (סה״כ)</p>
        <p class="value" id="sumCourtHoursCard">-</p>
      </div>
      <div class="metric">
        <p class="label">סה״כ מגרשים</p>
        <p class="value" id="sumCourtsCard">-</p>
      </div>
    </div>
  </div>
</main>

<footer>EZ7 Padel Tour — כלי תכנון פנימי</footer>

<script>
(function(){
  var idc = 1;
  function nid(){ return idc++; }

  var regions = [
    {id:nid(), name:"מרכז (תל אביב)", clubs:[
      {id:nid(), name:"מועדון א׳ - תל אביב", courts:6, games:15},
      {id:nid(), name:"מועדון ב׳ - רמת גן", courts:4, games:15},
      {id:nid(), name:"מועדון ג׳ - הרצליה", courts:3, games:10},
      {id:nid(), name:"מועדון ד׳ - ראשון לציון", courts:2, games:10}
    ]},
    {id:nid(), name:"חיפה / צפון", clubs:[
      {id:nid(), name:"מועדון א׳ - חיפה", courts:4, games:15},
      {id:nid(), name:"מועדון ב׳ - קריות", courts:2, games:10}
    ]},
    {id:nid(), name:"ירושלים", clubs:[
      {id:nid(), name:"מועדון מרכזי - ירושלים", courts:6, games:20}
    ]},
    {id:nid(), name:"באר שבע / דרום", clubs:[
      {id:nid(), name:"מועדון א׳ - באר שבע", courts:4, games:15},
      {id:nid(), name:"מועדון ב׳ - אשדוד", courts:2, games:10}
    ]}
  ];

  var tbody = document.getElementById('tbody');

  function round1(n){ return Math.round(n*10)/10; }

  function render(){
    var html = '';
    regions.forEach(function(r){
      html += '<tr class="region-row" data-region="'+r.id+'">'+
        '<td><input type="text" data-region-name="'+r.id+'" value="'+r.name+'"></td>'+
        '<td colspan="5"></td>'+
        '<td style="white-space:nowrap;">'+
          '<button class="icon-btn" data-add-club="'+r.id+'" aria-label="הוספת מועדון" title="הוספת מועדון">+</button>'+
          '<button class="icon-btn" data-rm-region="'+r.id+'" aria-label="הסר אזור" title="הסר אזור">×</button>'+
        '</td>'+
        '</tr>';

      r.clubs.forEach(function(c){
        html += '<tr class="club-row" data-club="'+c.id+'">'+
          '<td><input type="text" data-club-name="'+c.id+'" value="'+c.name+'"></td>'+
          '<td><input type="number" data-club-courts="'+c.id+'" value="'+c.courts+'" min="1" step="1"></td>'+
          '<td><input type="number" data-club-games="'+c.id+'" value="'+c.games+'" min="0" step="1"></td>'+
          '<td data-out-gpd="'+c.id+'">-</td>'+
          '<td data-out-hpd="'+c.id+'">-</td>'+
          '<td data-out-chw="'+c.id+'">-</td>'+
          '<td><button class="icon-btn" data-rm-club="'+c.id+'" aria-label="הסר מועדון" title="הסר מועדון">×</button></td>'+
          '</tr>';
      });

      html += '<tr class="subtotal-row" data-subtotal="'+r.id+'">'+
        '<td>סה״כ אזור</td>'+
        '<td data-sub-courts="'+r.id+'">-</td>'+
        '<td data-sub-games="'+r.id+'">-</td>'+
        '<td></td>'+
        '<td data-sub-hpd="'+r.id+'">-</td>'+
        '<td data-sub-chw="'+r.id+'">-</td>'+
        '<td></td>'+
        '</tr>';
    });
    tbody.innerHTML = html;
    recalc();
  }

  function recalc(){
    var slotHours = (parseFloat(document.getElementById('slotLen').value)||60)/60;
    var days = parseFloat(document.getElementById('days').value)||1;

    var grandGames=0, grandCourts=0, grandCourtHours=0, clubCount=0;

    regions.forEach(function(r){
      var rGames=0, rCourts=0, rCourtHours=0, rHoursDay=0;
      r.clubs.forEach(function(c){
        var gpd = c.games/days;
        var slotsNeeded = Math.ceil(gpd / c.courts);
        var hpd = slotsNeeded*slotHours;
        var chw = c.games*slotHours;

        var elG = tbody.querySelector('[data-out-gpd="'+c.id+'"]');
        var elH = tbody.querySelector('[data-out-hpd="'+c.id+'"]');
        var elC = tbody.querySelector('[data-out-chw="'+c.id+'"]');
        if(elG) elG.textContent = round1(gpd);
        if(elH) elH.textContent = round1(hpd);
        if(elC) elC.textContent = round1(chw);

        rGames += c.games;
        rCourts += c.courts;
        rCourtHours += chw;
        rHoursDay += hpd;
        clubCount++;
      });

      var sc = tbody.querySelector('[data-sub-courts="'+r.id+'"]');
      var sg = tbody.querySelector('[data-sub-games="'+r.id+'"]');
      var sh = tbody.querySelector('[data-sub-hpd="'+r.id+'"]');
      var sw = tbody.querySelector('[data-sub-chw="'+r.id+'"]');
      if(sc) sc.textContent = round1(rCourts);
      if(sg) sg.textContent = round1(rGames);
      if(sh) sh.textContent = round1(rHoursDay);
      if(sw) sw.textContent = round1(rCourtHours);

      grandGames += rGames;
      grandCourts += rCourts;
      grandCourtHours += rCourtHours;
    });

    document.getElementById('sumGamesCard').textContent = round1(grandGames);
    document.getElementById('sumVenuesCard').textContent = regions.length+' / '+clubCount;
    document.getElementById('sumCourtHoursCard').textContent = round1(grandCourtHours);
    document.getElementById('sumCourtsCard').textContent = round1(grandCourts);

    var gamesCard = document.getElementById('sumGamesCard');
    gamesCard.className = 'value ' + ((Math.round(grandGames)===120) ? 'ok' : 'warn');
  }

  function findClub(id){
    for(var i=0;i<regions.length;i++){
      for(var j=0;j<regions[i].clubs.length;j++){
        if(regions[i].clubs[j].id===id) return regions[i].clubs[j];
      }
    }
    return null;
  }

  tbody.addEventListener('input', function(e){
    var t = e.target;
    var id;
    if(t.hasAttribute('data-club-courts')){
      id = parseInt(t.getAttribute('data-club-courts'),10);
      var c = findClub(id); if(c){ c.courts = parseFloat(t.value)||1; recalc(); }
    } else if(t.hasAttribute('data-club-games')){
      id = parseInt(t.getAttribute('data-club-games'),10);
      var c2 = findClub(id); if(c2){ c2.games = parseFloat(t.value)||0; recalc(); }
    } else if(t.hasAttribute('data-club-name')){
      id = parseInt(t.getAttribute('data-club-name'),10);
      var c3 = findClub(id); if(c3){ c3.name = t.value; }
    } else if(t.hasAttribute('data-region-name')){
      id = parseInt(t.getAttribute('data-region-name'),10);
      var rg = regions.find(function(r){return r.id===id;});
      if(rg) rg.name = t.value;
    }
  });

  tbody.addEventListener('click', function(e){
    var addClubBtn = e.target.closest('[data-add-club]');
    if(addClubBtn){
      var rid = parseInt(addClubBtn.getAttribute('data-add-club'),10);
      var rg = regions.find(function(r){return r.id===rid;});
      if(rg) rg.clubs.push({id:nid(), name:'מועדון חדש', courts:2, games:10});
      render();
      return;
    }
    var rmClubBtn = e.target.closest('[data-rm-club]');
    if(rmClubBtn){
      var cid = parseInt(rmClubBtn.getAttribute('data-rm-club'),10);
      regions.forEach(function(r){ r.clubs = r.clubs.filter(function(c){return c.id!==cid;}); });
      render();
      return;
    }
    var rmRegionBtn = e.target.closest('[data-rm-region]');
    if(rmRegionBtn){
      var rrid = parseInt(rmRegionBtn.getAttribute('data-rm-region'),10);
      regions = regions.filter(function(r){return r.id!==rrid;});
      render();
      return;
    }
  });

  document.getElementById('addRegion').addEventListener('click', function(){
    regions.push({id:nid(), name:'אזור חדש', clubs:[{id:nid(), name:'מועדון חדש', courts:2, games:10}]});
    render();
  });

  document.getElementById('slotLen').addEventListener('input', recalc);
  document.getElementById('days').addEventListener('input', recalc);

  render();
})();
</script>

</body>
</html>
